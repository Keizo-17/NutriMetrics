<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NUTRICALCULO</title>
  
</head>
<body class="auth-body">

  <div class="auth-hero">
    <div class="auth-card">
      <h1 class="brand-title">NUTRICALCULO</h1>
      <p class="brand-subtitle">Sistema de gestión nutricional</p>

      <div class="auth-actions">
        <button type="button" class="btn btn-primary btn-large" onclick="mostrarLogin()">
          Iniciar sesión
        </button>
        <button type="button" class="btn btn-secondary btn-large" onclick="mostrarRegistro()">
          Registrarse
        </button>
      </div>
    </div>
  </div>

  <div id="overlay" class="overlay hidden" onclick="cerrarModales()"></div>

  <!-- Modal Login -->
  <div id="loginModal" class="modal hidden">
    <h2>Iniciar sesión</h2>

    <input type="email" id="loginEmail" placeholder="Correo electrónico" />
    <input type="password" id="loginPassword" placeholder="Contraseña" />

    <button type="button" class="btn btn-primary" onclick="login()">Entrar</button>
    <button type="button" class="btn btn-neutral" onclick="cerrarModales()">Cancelar</button>

    <p id="loginMensaje" class="msg"></p>
  </div>

  <!-- Modal Registro -->
  <div id="registroModal" class="modal hidden">
    <h2>Crear cuenta</h2>

    <input type="email" id="registerEmail" placeholder="Correo electrónico" />
    <input type="password" id="registerPassword" placeholder="Contraseña" />

    <button type="button" class="btn btn-secondary" onclick="registrar()">Crear cuenta</button>
    <button type="button" class="btn btn-neutral" onclick="cerrarModales()">Cancelar</button>

    <p id="registerMensaje" class="msg"></p>
  </div>

 
</body>
</html>
