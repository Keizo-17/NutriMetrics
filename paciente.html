<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paciente - NUTRICALCULO</title>
  styles.css
</head>
<body class="dashboard-body">

  <div class="dashboard-container">
    <div class="topbar">
      <div>
        <h1 class="topbar-title">Paciente</h1>
        <p class="topbar-subtitle">Detalle y seguimiento mensual</p>
      </div>

      <div class="topbar-actions">
        <button type="button" class="btn btn-neutral" onclick="volverDashboard()">Volver</button>
        <button type="button" class="btn btn-danger" onclick="logout()">Cerrar sesión</button>
      </div>
    </div>

    <div class="paciente-layout">
      <!-- Datos personales -->
      <section class="panel">
        <h2>Información del paciente</h2>

        <input type="hidden" id="pacienteId" />

        <div class="form-grid">
          <input type="text" id="editNombre" placeholder="Nombre" />
          <input type="text" id="editApellido" placeholder="Apellido" />

          <select id="editSexoPersonal">
            <option value="">Sexo</option>
            <option value="hombre">Hombre</option>
            <option value="mujer">Mujer</option>
          </select>

          <input type="text" id="editTelefono" placeholder="Teléfono" />
          <input type="email" id="editCorreo" placeholder="Correo electrónico" />
          <input type="text" id="editDireccion" placeholder="Dirección" />
        </div>

        <div class="form-actions">
          <button type="button" class="btn btn-primary" onclick="actualizarDatosPaciente()">
            Guardar cambios personales
          </button>
        </div>

        <div id="infoActualizacionPaciente" class="small-note"></div>
      </section>

      <!-- Nueva evaluación -->
      <section class="panel">
        <h2>Nueva evaluación nutricional</h2>

        <div class="form-grid">
          <input type="number" id="evalEdad" placeholder="Edad" />
          <input type="number" id="evalPeso" placeholder="Peso (kg)" />
          <input type="number" id="evalEstatura" placeholder="Estatura (cm)" />

          <select id="evalActividad">
            <option value="">Actividad física</option>
            <option value="1.2">Sedentario</option>
            <option value="1.375">Ligero</option>
            <option value="1.55">Moderado</option>
            <option value="1.725">Activo</option>
            <option value="1.9">Muy activo</option>
          </select>
        </div>

        <div class="form-actions">
          <button type="button" class="btn btn-secondary" onclick="guardarNuevaEvaluacion()">
            Guardar evaluación
          </button>
        </div>

        <div id="resultadoPaciente" class="resultado-card">
          <p class="resultado-empty">Aquí aparecerá el resultado de la evaluación.</p>
        </div>
      </section>
    </div>

    <!-- Historial -->
    <section class="panel historial-panel">
      <div class="table-header">
        <h2>Historial de modificaciones y resultados</h2>
      </div>

      <div class="table-wrap">
        <table id="tablaHistorial">
          <thead>
            <tr>
              <th>Fecha</th>
              <th>Edad</th>
              <th>Peso</th>
              <th>Estatura</th>
              <th>Actividad</th>
              <th>Calorías</th>
              <th>IMC</th>
              <th>Estado</th>
              <th>Proteínas</th>
              <th>Grasas</th>
              <th>Carbohidratos</th>
            </tr>
          </thead>
          <tbody>
            <!-- Se llena con JS -->
          </tbody>
        </table>
      </div>
    </section>
  </div>

  script.js>
</body>
</html>
