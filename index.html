<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NutriMetrics</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="portada-body">

  <main class="portada-wrapper">
    <section class="hero-card">
      <div class="logo-badge">NM</div>

      <h1 class="brand-title">NutriMetrics</h1>
      <p class="brand-subtitle">
        Sistema inteligente de gestión nutricional
      </p>

      <div class="hero-actions">
        <button type="button" class="btn btn-green" onclick="mostrarLogin()">
          Iniciar sesión
        </button>

        <button type="button" class="btn btn-blue" onclick="mostrarRegistro()">
          Registrarse
        </button>
      </div>
    </section>
  </main>

  <!-- Fondo modal -->
  <div id="overlay" class="overlay hidden" onclick="cerrarModales()"></div>

  <!-- Modal Login -->
  <section id="loginModal" class="modal hidden">
    <h2 class="modal-title">Iniciar sesión</h2>

    <label class="input-label" for="loginEmail">Correo electrónico</label>
    <input id="loginEmail" type="email" placeholder="tu@correo.com" />

    <label class="input-label" for="loginPassword">Contraseña</label>
    <input id="loginPassword" type="password" placeholder="••••••••" />

    <button type="button" class="btn btn-green" onclick="login()">
      Entrar
    </button>
    <button type="button" class="btn btn-gray" onclick="cerrarModales()">
      Cancelar
    </button>

    <p id="loginMensaje" class="msg"></p>
  </section>

  <!-- Modal Registro -->
  <section id="registroModal" class="modal hidden">
    <h2 class="modal-title">Crear cuenta</h2>

    <label class="input-label" for="registerUser">Nombre de usuario</label>
    <input id="registerUser" type="text" placeholder="Ej. nutri_admin" />

    <label class="input-label" for="registerEmail">Correo electrónico</label>
    <input id="registerEmail" type="email" placeholder="tu@correo.com" />

    <label class="input-label" for="registerPassword">Contraseña</label>
    <input id="registerPassword" type="password" placeholder="Mínimo 6 caracteres" />

    <button type="button" class="btn btn-blue" onclick="registrar()">
      Crear cuenta
    </button>
    <button type="button" class="btn btn-gray" onclick="cerrarModales()">
      Cancelar
    </button>

    <p id="registerMensaje" class="msg"></p>
  </section>

  <script type="module" src="script.js"></script>
</body>
</html>
