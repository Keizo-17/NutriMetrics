<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

styles.css

</head>

<body class="dashboard">

<div class="panel">

  <div class="topbar">

    <h2>NutriMetrics</h2>

    <!-- ✅ SOLO 1 BOTON -->
    <button onclick="cerrarSesion()" class="btn rojo">
      Cerrar sesión
    </button>

  </div>

  <div class="menu">

    <button onclick="mostrarFormulario()" class="btn verde">
      ➕ Nuevo Paciente
    </button>

    <button onclick="mostrarLista()" class="btn azul">
      🔍 Buscar Paciente
    </button>

  </div>

  <!-- FORMULARIO -->
  <div id="formulario" class="contenido oculto">

    <input id="nombre" placeholder="Nombre">
    <input id="apellido" placeholder="Apellido">
    <input id="edad" placeholder="Edad">
    <input id="peso" placeholder="Peso">

    <button onclick="guardarPaciente()" class="btn verde">
      Guardar
    </button>

  </div>

  <!-- LISTA -->
  <ul id="lista" class="contenido"></ul>

</div>

script.jsscript>

</body>
</html>
